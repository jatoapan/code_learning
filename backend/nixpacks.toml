[providers]
    - name = "php"

[variables]
    NIXPACKS_PHP_VERSION = "8.3"
    APP_ENV = "production"
    APP_DEBUG = "false"
    LOG_CHANNEL = "stderr"
    LOG_LEVEL = "info"
    DB_CONNECTION = "mysql"
    QUEUE_CONNECTION = "redis"
    SESSION_DRIVER = "database"
    CACHE_STORE = "redis"

[phases.setup]
    nixPkgs = ["...", "php83Extensions.redis", "php83Extensions.pdo_mysql"]

[phases.build]
    cmds = ["composer install --no-dev --optimize-autoloader", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache", "php artisan storage:link", "php artisan test", "php artisan tinker --execute=\"echo PHP_EOL.'[RAILWAY_AUTODIAGNOSTICO] 🚀 SISTEMA ESTABLE: Modelo User cargado exitosamente -> ' . get_class(new \App\Models\User) . PHP_EOL;\""]
